spring.application.name=planetbooks-back
app.api.public-url=
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# H2 Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Config
app.jwt.secret=estaeslaclavemassecretadelmundomundialdicenqueesmuycortaperono
app.jwt.expiration=3600000

# R2 — deshabilitado en tests (no conecta a cloudflare en CI)
app.r2.enabled=false
app.r2.bucket=test-bucket
app.r2.public-url=http://localhost:9000/test-bucket
app.r2.endpoint=http://localhost:9000
app.r2.region=us-east-1
app.r2.access-key=test-key
app.r2.secret-key=test-secret
