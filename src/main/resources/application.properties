spring.application.name=planetbooks-back
app.jwt.secret=estaselaclavenmassecretadelmundomundialdicenqueesmuycortaperono
app.jwt.expiration=3600000

# Detrás de proxy HTTPS (Docploy/nginx): evita que Swagger genere http:// en producción
server.forward-headers-strategy=framework

# URL pública de la API (Swagger "Try it out" y OpenAPI servers). Sobrescribir con APP_API_PUBLIC_URL en despliegue.
app.api.public-url=${APP_API_PUBLIC_URL:}

# Orígenes permitidos (patrones). Sobrescribir con APP_CORS_ALLOWED_ORIGIN_PATTERNS si hace falta.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://planetbook.solidwebs.com,http://localhost:*,http://127.0.0.1:*,https://planetbooks-front.onrender.com/}

# CORRECCIÓN: URL sin contraseña embebida
spring.datasource.url=jdbc:mysql://38.253.141.220:3309/planetbooks-db
spring.datasource.username=root
spring.datasource.password=cIs9OxJTzgditIp2ltEd

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger / OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true

# Upload configuration
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# ── Cloudflare R2 (S3-compatible) ──────────────────────────────────────────
# Credenciales en production-prod.properties; usar variables de entorno en deploy
app.r2.enabled=${APP_R2_ENABLED:false}
app.r2.bucket=${APP_R2_BUCKET:planetbooks-images}
app.r2.public-url=${APP_R2_PUBLIC_URL:}
app.r2.endpoint=${APP_R2_ENDPOINT:}
app.r2.region=${APP_R2_REGION:auto}
app.r2.access-key=${APP_R2_ACCESS_KEY:}
app.r2.secret-key=${APP_R2_SECRET_KEY:}