# application.properties - PlanetBooks Backend

## ============================================
## Configuración Base de Datos (MySQL)
## ============================================

# MySQL Driver Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/planetbooks?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tu_contraseña_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=INFO
logging.level.com.rodrigomv.planetbooksback=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

## ============================================
## Configuración Spring Security
## ============================================

# JWT Configuration (ejemplo si usas JWT)
app.jwt.secret=tu_jwt_secret_key_aqui_debe_ser_largo_y_seguro_minimo_32_caracteres
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.max-age=3600

## ============================================
## Configuración de la Aplicación
## ============================================

# Server Port
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=planetbooks-back
app.version=0.0.1

# File Upload
app.upload.dir=/opt/uploads/products
app.upload.max-size=10485760

## ============================================
## Configuración de Errores
## ============================================

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

## ============================================
## Actuator (Monitoreo opcional)
## ============================================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.enable.jvm=true

## ============================================
## Configuración de Sesión
## ============================================

# Session Management
server.servlet.session.timeout=1h
spring.session.store-type=none

## ============================================
## Validación
## ============================================

# Bean Validation
spring.mvc.throw-exception-if-no-handler-found=true
spring.resources.add-mappings=false

## ============================================
## MultiPart Upload
## ============================================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

## ============================================
## TimeZone
## ============================================

spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

